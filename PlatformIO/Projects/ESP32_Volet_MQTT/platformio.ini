; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Vitesse du moniteur série (doit correspondre à Serial.begin(115200))
monitor_speed = 115200

; Vitesse de téléversement (accélère le flashage de la puce)
upload_speed = 115200

lib_deps =
    ; Bibliothèque pour le portail de configuration WiFi (Solution B)
    https://github.com/tzapu/WiFiManager.git
    
    ; Bibliothèque pour la communication MQTT
    knolleary/PubSubClient@^2.8

; Configuration optionnelle pour la gestion de la mémoire Flash (si on utilise LittleFS plus tard)
board_build.partitions = default.csv